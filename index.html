<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TENBIN AI</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Noto+Serif+JP&display=swap" rel="stylesheet">
<style>
:root{--bg:#07080f;--sf:#0e0f1a;--bd:#1c1d2e;--tx:#d8daf0;--mt:#44465a}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--tx);font-family:'Noto Serif JP',serif;min-height:100vh}
body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
background:radial-gradient(ellipse 80% 50% at 20% 20%,rgba(123,108,255,.07) 0%,transparent 60%),
radial-gradient(ellipse 60% 60% at 80% 80%,rgba(67,233,123,.05) 0%,transparent 60%)}
header{position:sticky;top:0;z-index:100;background:rgba(7,8,15,.93);backdrop-filter:blur(20px);
border-bottom:1px solid var(--bd);padding:14px 28px;display:flex;align-items:center;justify-content:space-between}
.logo{font-family:'Syne',sans-serif;font-weight:800;font-size:20px;letter-spacing:4px;
background:linear-gradient(100deg,#7b6cff,#43e97b);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.sub{font-family:'Syne',sans-serif;font-size:10px;letter-spacing:2px;color:var(--mt);margin-top:2px}
.badge{padding:6px 14px;background:rgba(67,233,123,.07);border:1px solid rgba(67,233,123,.3);
border-radius:20px;font-family:'Syne',sans-serif;font-size:11px;color:#43e97b;letter-spacing:1px}
.panel{position:relative;z-index:1;max-width:820px;margin:24px auto 0;padding:0 24px}
.box{background:var(--sf);border:1px solid rgba(123,108,255,.3);border-radius:16px;padding:24px 28px}
.box-title{font-family:'Syne',sans-serif;font-weight:800;font-size:13px;letter-spacing:3px;color:#7b6cff;margin-bottom:14px}
.steps{display:flex;flex-direction:column;gap:10px;margin-bottom:18px}
.step{display:flex;align-items:center;gap:12px;font-family:'Syne',sans-serif;font-size:12px;color:var(--tx)}
.num{width:24px;height:24px;border-radius:50%;background:rgba(123,108,255,.2);border:1px solid #7b6cff;
color:#7b6cff;font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.step a{color:#43e97b;text-decoration:none;border-bottom:1px solid rgba(67,233,123,.4)}
.row{display:flex;gap:10px}
.ki{flex:1;padding:12px 16px;background:#0a0b14;border:1px solid var(--bd);border-radius:10px;
color:var(--tx);font-family:'Syne',sans-serif;font-size:13px;outline:none;transition:border-color .3s}
.ki:focus{border-color:#7b6cff}
.ki::placeholder{color:var(--mt)}
.ks{font-family:'Syne',sans-serif;font-size:11px;margin-top:8px;letter-spacing:1px;min-height:18px}
.ks.ok{color:#43e97b}.ks.warn{color:#f7c948}
.btn{padding:12px 22px;background:linear-gradient(135deg,#7b6cff,#5e8bff);border:none;border-radius:10px;
color:#fff;font-family:'Syne',sans-serif;font-weight:700;font-size:12px;letter-spacing:2px;cursor:pointer;transition:all .22s}
.btn:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(123,108,255,.4)}
.iz{position:relative;z-index:1;max-width:820px;margin:16px auto 0;padding:0 24px}
.il{font-family:'Syne',sans-serif;font-size:10px;letter-spacing:3px;color:var(--mt);text-transform:uppercase;margin-bottom:10px}
textarea{width:100%;min-height:100px;padding:18px 20px;background:var(--sf);
border:1px solid var(--bd);border-radius:14px;color:var(--tx);
font-family:'Noto Serif JP',serif;font-size:15px;line-height:1.7;resize:none;outline:none;transition:border-color .3s}
textarea:focus{border-color:#7b6cff;box-shadow:0 0 0 3px rgba(123,108,255,.15)}
textarea::placeholder{color:var(--mt)}
.acts{display:flex;gap:10px;margin-top:12px;align-items:center}
.send{padding:13px 28px;background:linear-gradient(135deg,#7b6cff,#5e8bff);border:none;border-radius:10px;
color:#fff;font-family:'Syne',sans-serif;font-weight:700;font-size:13px;letter-spacing:2px;
cursor:pointer;transition:all .25s;box-shadow:0 4px 20px rgba(123,108,255,.3)}
.send:hover:not(:disabled){transform:translateY(-2px)}
.send:disabled{opacity:.35;cursor:not-allowed;transform:none}
.clr{padding:13px 18px;background:transparent;border:1px solid var(--bd);border-radius:10px;
color:var(--mt);font-family:'Syne',sans-serif;font-size:12px;cursor:pointer;transition:all .2s}
.clr:hover{border-color:#ff6b6b;color:#ff6b6b}
.hint{margin-left:auto;font-size:11px;color:var(--mt);font-family:'Syne',sans-serif}
.grid{position:relative;z-index:1;display:grid;grid-template-columns:1fr 1fr;gap:18px;
max-width:1260px;margin:24px auto 48px;padding:0 24px}
@media(max-width:760px){.grid{grid-template-columns:1fr}.hint{display:none}}
.card{background:var(--sf);border:1px solid var(--bd);border-radius:16px;
overflow:hidden;display:flex;flex-direction:column;min-height:220px;transition:border-color .4s,box-shadow .4s}
.card.loading{border-color:var(--c);box-shadow:0 0 24px color-mix(in srgb,var(--c) 18%,transparent)}
.card.done{border-color:color-mix(in srgb,var(--c) 45%,transparent)}
.ch{padding:16px 20px 12px;border-bottom:1px solid var(--bd);display:flex;align-items:center;gap:8px}
.ci{font-size:17px;color:var(--c);filter:drop-shadow(0 0 5px var(--c))}
.cn{font-family:'Syne',sans-serif;font-weight:800;font-size:12px;letter-spacing:3px;color:var(--c);text-transform:uppercase}
.cm{margin-left:auto;font-family:'Syne',sans-serif;font-size:9px;color:var(--mt);
background:rgba(255,255,255,.03);padding:2px 7px;border-radius:4px;border:1px solid var(--bd);max-width:160px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.sp{width:7px;height:7px;border-radius:50%;background:var(--c);animation:pulse 1s infinite;margin-left:4px}
.cb{padding:18px 20px;flex:1;overflow-y:auto;max-height:360px}
.cb p{font-size:14px;line-height:1.85;color:#a8aac8;white-space:pre-wrap}
.cb .er{color:#ff8080;font-family:'Syne',sans-serif;font-size:12px;line-height:1.8;
background:rgba(255,100,100,.07);border:1px solid rgba(255,100,100,.2);border-radius:8px;padding:12px 14px}
.sk{display:flex;flex-direction:column;gap:9px}
.sl{height:9px;border-radius:5px;background:linear-gradient(90deg,#1c1d2e 25%,#252636 50%,#1c1d2e 75%);
background-size:200% 100%;animation:shimmer 1.6s infinite}
.empty{position:relative;z-index:1;display:flex;flex-direction:column;align-items:center;
justify-content:center;padding:48px 24px;text-align:center}
.ei{font-size:28px;display:flex;gap:14px;margin-bottom:14px}
.ei span{animation:float 3s ease-in-out infinite}
.ei span:nth-child(2){animation-delay:.4s}.ei span:nth-child(3){animation-delay:.8s}.ei span:nth-child(4){animation-delay:1.2s}
.et{font-family:'Syne',sans-serif;font-size:12px;letter-spacing:2px;color:var(--mt)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.2}}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.fi{animation:fadeIn .35s ease forwards}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--bd);border-radius:2px}
</style>
</head>
<body>
<header>
  <div><div class="logo">TENBIN AI</div><div class="sub">無料マルチAI比較 · OpenRouter</div></div>
  <div class="badge">✓ 完全無料</div>
</header>
<div class="panel">
  <div class="box">
    <div class="box-title">⚙ APIキー設定</div>
    <div class="steps">
      <div class="step"><span class="num">1</span><span><a href="https://openrouter.ai" target="_blank">openrouter.ai</a> でGoogleアカウント登録（無料・カード不要）</span></div>
      <div class="step"><span class="num">2</span><span><a href="https://openrouter.ai/keys" target="_blank">openrouter.ai/keys</a> で「Create Key」→ コピー</span></div>
      <div class="step"><span class="num">3</span><span>下に貼り付けて「保存」→ 完了！</span></div>
    </div>
    <div class="row">
      <input type="password" class="ki" id="ki" placeholder="sk-or-v1-xxxxxxxxxxxxxxxx">
      <button class="btn" onclick="saveKey()">保存</button>
    </div>
    <div class="ks" id="ks"></div>
  </div>
</div>
<div class="iz">
  <div class="il">プロンプト</div>
  <textarea id="pt" placeholder="例：「AIは人間の仕事を奪うか？」について議論してください..."></textarea>
  <div class="acts">
    <button class="send" id="sb" onclick="go()">▶ 全AIに一斉送信</button>
    <button class="clr" onclick="clr()">✕ クリア</button>
    <span class="hint">Ctrl+Enter でも送信</span>
  </div>
</div>
<div id="es" class="empty">
  <div class="ei"><span>⚡</span><span>⬡</span><span>◈</span><span>✦</span></div>
  <div class="et">APIキーを設定してプロンプトを送信してください</div>
</div>
<div class="grid" id="gd" style="display:none"></div>
<script>
const URL='https://openrouter.ai/api/v1/chat/completions';
const KS='tenbin_key';
const SLOTS=[
  {id:'a',icon:'⚡',color:'#ff7c5c',label:'AI-1'},
  {id:'b',icon:'⬡',color:'#4e9bff',label:'AI-2'},
  {id:'c',icon:'◈',color:'#d4a574',label:'AI-3'},
  {id:'d',icon:'✦',color:'#a78bfa',label:'AI-4'},
];
let busy=false;
const lk=()=>localStorage.getItem(KS)||'';
function saveKey(){
  const v=document.getElementById('ki').value.trim();
  if(!v){ss('キーを入力してください','warn');return}
  if(!v.startsWith('sk-or-')){ss('"sk-or-" から始まるキーを入力してください','warn');return}
  localStorage.setItem(KS,v);ss('✓ 保存しました！','ok');
}
function ss(m,c){const e=document.getElementById('ks');e.textContent=m;e.className='ks '+(c||'')}
(function(){const s=lk();if(s){document.getElementById('ki').value=s;ss('✓ 設定済み','ok')}})();
function card(s,i){
  const d=document.createElement('div');
  d.className='card fi';d.id='c'+s.id;d.style.setProperty('--c',s.color);
  d.innerHTML=`<div class="ch"><span class="ci">${s.icon}</span><span class="cn">${s.label}</span>
    <span class="cm" id="m${s.id}">選択中...</span><span class="sp" id="sp${s.id}"></span></div>
    <div class="cb" id="b${s.id}"><div class="sk">${[100,82,91,68,75].map(w=>`<div class="sl" style="width:${w}%"></div>`).join('')}</div></div>`;
  return d;
}
function tw(el,txt){
  const p=document.createElement('p');el.innerHTML='';el.appendChild(p);
  let i=0;const t=setInterval(()=>{p.textContent=txt.slice(0,++i);if(i>=txt.length)clearInterval(t)},4);
}
async function call(s,prompt,key){
  const b=document.getElementById('b'+s.id),cd=document.getElementById('c'+s.id);
  cd.classList.add('loading');
  try{
    const r=await fetch(URL,{method:'POST',
      headers:{'Authorization':'Bearer '+key,'Content-Type':'application/json',
        'HTTP-Referer':location.href,'X-Title':'TENBIN AI'},
      body:JSON.stringify({model:'openrouter/free',messages:[{role:'user',content:prompt}]})});
    if(!r.ok){const e=await r.json().catch(()=>({}));throw new Error(r.status+': '+(e?.error?.message||r.statusText))}
    const d=await r.json();
    const used=d?.model||'openrouter/free';
    document.getElementById('m'+s.id).textContent=used.split('/').pop();
    const txt=d?.choices?.[0]?.message?.content||'（空の回答）';
    cd.classList.remove('loading');cd.classList.add('done');
    document.getElementById('sp'+s.id)?.remove();tw(b,txt);
  }catch(e){
    cd.classList.remove('loading');document.getElementById('sp'+s.id)?.remove();
    document.getElementById('m'+s.id).textContent='エラー';
    b.innerHTML=`<div class="er">⚠ ${e.message}<br><br>💡 <a href="https://openrouter.ai/keys" target="_blank" style="color:#43e97b">openrouter.ai/keys</a> でキーを確認してください</div>`;
  }
}
async function go(){
  if(busy)return;
  const key=lk();if(!key){ss('⚠ APIキーを先に保存してください','warn');return}
  const prompt=document.getElementById('pt').value.trim();if(!prompt){document.getElementById('pt').focus();return}
  busy=true;const sb=document.getElementById('sb');sb.disabled=true;sb.textContent='送信中...';
  document.getElementById('es').style.display='none';
  const gd=document.getElementById('gd');gd.style.display='grid';gd.innerHTML='';
  SLOTS.forEach((s,i)=>gd.appendChild(card(s,i)));
  await Promise.all(SLOTS.map(s=>call(s,prompt,key)));
  busy=false;sb.disabled=false;sb.textContent='▶ 全AIに一斉送信';
}
function clr(){
  document.getElementById('pt').value='';
  document.getElementById('gd').style.display='none';document.getElementById('gd').innerHTML='';
  document.getElementById('es').style.display='flex';
}
document.addEventListener('keydown',e=>{if((e.ctrlKey||e.metaKey)&&e.key==='Enter')go()});
</script>
</body>
</html>
