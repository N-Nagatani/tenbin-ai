<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TENBIN AI – 議論 & 審判</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=Noto+Serif+JP:wght@300;400;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#06070d;--sf:#0c0d18;--sf2:#101120;--bd:#1a1b2e;--tx:#d4d6f0;--mt:#3a3c52;
  --p:#7b6cff;--g:#3de87a;--o:#ff8c5a;--r:#ff5a7a;--b:#4ea8ff;--y:#f5c842;
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--tx);font-family:'Noto Serif JP',serif;min-height:100vh;overflow-x:hidden}

/* 背景グロー */
body::before{
  content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
  background:
    radial-gradient(ellipse 60% 40% at 10% 10%,rgba(123,108,255,.08) 0%,transparent 55%),
    radial-gradient(ellipse 50% 50% at 90% 90%,rgba(61,232,122,.06) 0%,transparent 55%),
    radial-gradient(ellipse 40% 60% at 50% 50%,rgba(255,90,122,.04) 0%,transparent 60%);
}

/* ── HEADER ── */
header{
  position:sticky;top:0;z-index:200;
  background:rgba(6,7,13,.95);backdrop-filter:blur(24px);
  border-bottom:1px solid var(--bd);
  padding:0 32px;height:60px;
  display:flex;align-items:center;justify-content:space-between;
}
.logo{
  font-family:'Syne',sans-serif;font-weight:800;font-size:18px;letter-spacing:5px;
  background:linear-gradient(110deg,var(--p),var(--g));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
}
.header-right{display:flex;align-items:center;gap:12px}
.phase-indicator{
  display:flex;align-items:center;gap:8px;
  font-family:'Syne',sans-serif;font-size:10px;letter-spacing:2px;color:var(--mt);
}
.phase-dot{
  width:7px;height:7px;border-radius:50%;background:var(--mt);
  transition:background .4s,box-shadow .4s;
}
.phase-dot.active{background:var(--g);box-shadow:0 0 8px var(--g)}
.phase-dot.done{background:var(--p)}

/* ── SETUP ── */
.wrap{position:relative;z-index:1;max-width:860px;margin:0 auto;padding:0 24px}
.setup{margin-top:28px}
.box{
  background:var(--sf);border:1px solid rgba(123,108,255,.25);
  border-radius:18px;padding:24px 28px;
}
.box-title{
  font-family:'Syne',sans-serif;font-weight:800;font-size:12px;
  letter-spacing:3px;color:var(--p);margin-bottom:16px;
  display:flex;align-items:center;gap:8px;
}
.steps{display:flex;flex-direction:column;gap:10px;margin-bottom:18px}
.step{display:flex;align-items:center;gap:12px;font-family:'Syne',sans-serif;font-size:12px;color:var(--tx)}
.num{
  width:22px;height:22px;border-radius:50%;flex-shrink:0;
  background:rgba(123,108,255,.15);border:1px solid var(--p);
  color:var(--p);font-size:10px;font-weight:700;
  display:flex;align-items:center;justify-content:center;
}
.step a{color:var(--g);text-decoration:none;border-bottom:1px solid rgba(61,232,122,.3)}
.ki-row{display:flex;gap:10px}
.ki{
  flex:1;padding:11px 16px;background:#08091a;
  border:1px solid var(--bd);border-radius:10px;
  color:var(--tx);font-family:'Syne',sans-serif;font-size:13px;outline:none;
  transition:border-color .3s,box-shadow .3s;
}
.ki:focus{border-color:var(--p);box-shadow:0 0 0 3px rgba(123,108,255,.12)}
.ki::placeholder{color:var(--mt)}
.ks{font-family:'Syne',sans-serif;font-size:11px;margin-top:8px;letter-spacing:1px;min-height:16px}
.ks.ok{color:var(--g)}.ks.warn{color:var(--y)}
.save-btn{
  padding:11px 20px;background:linear-gradient(135deg,var(--p),#5e8bff);
  border:none;border-radius:10px;color:#fff;
  font-family:'Syne',sans-serif;font-weight:700;font-size:12px;letter-spacing:2px;
  cursor:pointer;white-space:nowrap;transition:all .22s;
}
.save-btn:hover{transform:translateY(-1px);box-shadow:0 6px 18px rgba(123,108,255,.4)}

/* ── TOPIC INPUT ── */
.topic-section{margin-top:20px}
.section-label{
  font-family:'Syne',sans-serif;font-size:10px;letter-spacing:3px;
  color:var(--mt);text-transform:uppercase;margin-bottom:10px;
}
textarea#topic{
  width:100%;min-height:90px;padding:18px 20px;
  background:var(--sf);border:1px solid var(--bd);border-radius:14px;
  color:var(--tx);font-family:'Noto Serif JP',serif;font-size:15px;line-height:1.7;
  resize:none;outline:none;transition:border-color .3s,box-shadow .3s;
}
textarea#topic:focus{border-color:var(--p);box-shadow:0 0 0 3px rgba(123,108,255,.12)}
textarea#topic::placeholder{color:var(--mt)}

/* ── ROLE CARDS ── */
.roles-section{margin-top:20px}
.roles-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-top:10px}
@media(max-width:700px){.roles-grid{grid-template-columns:1fr 1fr}}
.role-card{
  background:var(--sf2);border:1px solid var(--bd);border-radius:12px;
  padding:14px;transition:border-color .3s;
}
.role-header{
  display:flex;align-items:center;gap:8px;margin-bottom:8px;
}
.role-icon{font-size:16px;filter:drop-shadow(0 0 4px var(--rc))}
.role-name{
  font-family:'Syne',sans-serif;font-size:10px;font-weight:700;
  letter-spacing:2px;color:var(--rc);text-transform:uppercase;
}
.role-input{
  width:100%;background:transparent;border:none;outline:none;
  color:var(--tx);font-family:'Syne',sans-serif;font-size:11px;
  border-bottom:1px solid var(--bd);padding-bottom:4px;
  transition:border-color .3s;
}
.role-input:focus{border-color:var(--rc)}
.role-input::placeholder{color:var(--mt);font-size:10px}

/* ── START BTN ── */
.start-area{display:flex;gap:12px;margin-top:20px;align-items:center}
.start-btn{
  padding:14px 36px;
  background:linear-gradient(135deg,var(--p) 0%,var(--r) 50%,var(--o) 100%);
  background-size:200% 100%;
  border:none;border-radius:12px;color:#fff;
  font-family:'Syne',sans-serif;font-weight:800;font-size:14px;letter-spacing:3px;
  cursor:pointer;transition:all .3s;
  box-shadow:0 4px 24px rgba(123,108,255,.35);
}
.start-btn:hover:not(:disabled){
  background-position:100% 0;
  transform:translateY(-2px);
  box-shadow:0 8px 32px rgba(123,108,255,.5);
}
.start-btn:disabled{opacity:.35;cursor:not-allowed;transform:none}
.reset-btn{
  padding:14px 20px;background:transparent;
  border:1px solid var(--bd);border-radius:12px;
  color:var(--mt);font-family:'Syne',sans-serif;font-size:12px;
  cursor:pointer;transition:all .2s;
}
.reset-btn:hover{border-color:var(--r);color:var(--r)}
.shortcut{margin-left:auto;font-family:'Syne',sans-serif;font-size:11px;color:var(--mt)}

/* ── DEBATE ARENA ── */
.arena{
  position:relative;z-index:1;
  max-width:1280px;margin:32px auto 0;padding:0 24px;
}
.arena-title{
  font-family:'Syne',sans-serif;font-size:11px;letter-spacing:4px;
  color:var(--mt);text-transform:uppercase;margin-bottom:16px;
  display:flex;align-items:center;gap:10px;
}
.arena-title::after{content:'';flex:1;height:1px;background:var(--bd)}

/* 議論パネル */
.debate-grid{
  display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-bottom:16px;
}
@media(max-width:900px){.debate-grid{grid-template-columns:1fr}}

/* 審判パネル */
.judge-panel{
  background:linear-gradient(135deg,rgba(12,13,24,.9),rgba(16,17,32,.9));
  border:1px solid rgba(245,200,66,.2);
  border-radius:18px;overflow:hidden;
  transition:border-color .4s,box-shadow .4s;
  position:relative;
}
.judge-panel.active{
  border-color:var(--y);
  box-shadow:0 0 40px rgba(245,200,66,.15);
}
.judge-glow{
  position:absolute;top:0;left:0;right:0;height:2px;
  background:linear-gradient(90deg,transparent,var(--y),transparent);
  opacity:0;transition:opacity .4s;
}
.judge-panel.active .judge-glow{opacity:1;animation:scan 2s infinite}
.judge-header{
  padding:18px 24px 14px;
  border-bottom:1px solid rgba(245,200,66,.15);
  display:flex;align-items:center;gap:10px;
  background:rgba(245,200,66,.03);
}
.judge-crown{font-size:22px;filter:drop-shadow(0 0 8px var(--y))}
.judge-title{
  font-family:'Syne',sans-serif;font-weight:800;font-size:14px;
  letter-spacing:3px;color:var(--y);text-transform:uppercase;
}
.judge-subtitle{
  margin-left:auto;font-family:'Syne',sans-serif;font-size:9px;
  color:rgba(245,200,66,.4);letter-spacing:1px;
}
.judge-spinner{
  width:8px;height:8px;border-radius:50%;
  background:var(--y);animation:pulse 1s infinite;margin-left:6px;
}
.judge-body{
  padding:22px 24px;min-height:160px;
}
.judge-body p{
  font-size:15px;line-height:1.9;color:#d8c87a;
  font-family:'Noto Serif JP',serif;white-space:pre-wrap;
}
.judge-waiting{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  height:120px;gap:12px;
}
.judge-waiting-text{
  font-family:'Syne',sans-serif;font-size:11px;letter-spacing:2px;color:var(--mt);
}
.waiting-dots{display:flex;gap:6px}
.waiting-dots span{
  width:6px;height:6px;border-radius:50%;background:var(--mt);
  animation:pulse 1.4s infinite;
}
.waiting-dots span:nth-child(2){animation-delay:.2s}
.waiting-dots span:nth-child(3){animation-delay:.4s}

/* 議論カード */
.dcard{
  background:var(--sf);border:1px solid var(--bd);border-radius:16px;
  overflow:hidden;display:flex;flex-direction:column;min-height:200px;
  transition:border-color .4s,box-shadow .4s;
}
.dcard.loading{
  border-color:var(--rc);
  box-shadow:0 0 20px color-mix(in srgb,var(--rc) 15%,transparent);
}
.dcard.done{border-color:color-mix(in srgb,var(--rc) 40%,transparent)}
.dcard-header{
  padding:14px 18px 10px;border-bottom:1px solid var(--bd);
  display:flex;align-items:center;gap:8px;
}
.dcard-icon{font-size:15px;color:var(--rc);filter:drop-shadow(0 0 4px var(--rc))}
.dcard-name{
  font-family:'Syne',sans-serif;font-weight:800;font-size:11px;
  letter-spacing:3px;color:var(--rc);text-transform:uppercase;
}
.dcard-model{
  margin-left:auto;font-family:'Syne',sans-serif;font-size:8px;
  color:var(--mt);padding:2px 6px;border-radius:3px;
  border:1px solid var(--bd);background:rgba(255,255,255,.02);
  max-width:140px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
}
.dcard-spinner{
  width:6px;height:6px;border-radius:50%;
  background:var(--rc);animation:pulse 1s infinite;margin-left:3px;
}
.dcard-body{padding:16px 18px;flex:1;overflow-y:auto;max-height:300px}
.dcard-body p{font-size:13px;line-height:1.8;color:#9a9cb8;white-space:pre-wrap}
.dcard-body .er{
  color:#ff7070;font-family:'Syne',sans-serif;font-size:11px;line-height:1.8;
  background:rgba(255,90,90,.06);border:1px solid rgba(255,90,90,.18);
  border-radius:8px;padding:10px 12px;
}

/* skeleton */
.sk{display:flex;flex-direction:column;gap:8px}
.sl{
  height:8px;border-radius:4px;
  background:linear-gradient(90deg,#181924 25%,#20213a 50%,#181924 75%);
  background-size:200% 100%;animation:shimmer 1.6s infinite;
}

/* 進捗バー */
.progress-bar{
  position:relative;z-index:1;max-width:860px;margin:24px auto 0;padding:0 24px;
}
.progress-track{
  height:3px;background:var(--bd);border-radius:2px;overflow:hidden;
}
.progress-fill{
  height:100%;background:linear-gradient(90deg,var(--p),var(--g));
  border-radius:2px;transition:width .6s ease;width:0%;
}
.progress-label{
  font-family:'Syne',sans-serif;font-size:10px;letter-spacing:2px;
  color:var(--mt);margin-top:8px;text-align:center;min-height:16px;
}

/* empty */
.empty-state{
  position:relative;z-index:1;
  display:flex;flex-direction:column;align-items:center;
  justify-content:center;padding:56px 24px;text-align:center;
}
.ei{font-size:26px;display:flex;gap:12px;margin-bottom:14px}
.ei span{animation:float 3s ease-in-out infinite}
.ei span:nth-child(2){animation-delay:.3s}
.ei span:nth-child(3){animation-delay:.6s}
.ei span:nth-child(4){animation-delay:.9s}
.et{font-family:'Syne',sans-serif;font-size:11px;letter-spacing:3px;color:var(--mt)}

@keyframes pulse{0%,100%{opacity:1}50%{opacity:.15}}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-7px)}}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes scan{0%{transform:translateX(-100%)}100%{transform:translateX(100%)}}
@keyframes judgeIn{from{opacity:0;transform:scale(.98)}to{opacity:1;transform:scale(1)}}
.fi{animation:fadeIn .4s ease forwards}
.ji{animation:judgeIn .5s ease forwards}

::-webkit-scrollbar{width:3px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--bd);border-radius:2px}
</style>
</head>
<body>

<!-- HEADER -->
<header>
  <div>
    <div class="logo">TENBIN AI</div>
  </div>
  <div class="header-right">
    <div class="phase-indicator">
      <span class="phase-dot" id="pd1" title="議論フェーズ"></span>
      <span style="letter-spacing:1px">議論</span>
      <span style="color:var(--bd);margin:0 4px">▶</span>
      <span class="phase-dot" id="pd2" title="審判フェーズ"></span>
      <span style="letter-spacing:1px">審判</span>
      <span style="color:var(--bd);margin:0 4px">▶</span>
      <span class="phase-dot" id="pd3" title="結論フェーズ"></span>
      <span style="letter-spacing:1px">結論</span>
    </div>
  </div>
</header>

<!-- SETUP -->
<div class="wrap">
  <div class="setup">
    <div class="box">
      <div class="box-title">⚙ APIキー設定</div>
      <div class="steps">
        <div class="step"><span class="num">1</span><span><a href="https://openrouter.ai" target="_blank">openrouter.ai</a> でGoogleアカウント登録（無料・カード不要）</span></div>
        <div class="step"><span class="num">2</span><span><a href="https://openrouter.ai/keys" target="_blank">openrouter.ai/keys</a> で「Create Key」→ コピー</span></div>
        <div class="step"><span class="num">3</span><span>下に貼り付けて「保存」</span></div>
      </div>
      <div class="ki-row">
        <input type="password" class="ki" id="ki" placeholder="sk-or-v1-xxxxxxxxxxxxxxxx">
        <button class="save-btn" onclick="saveKey()">保存</button>
      </div>
      <div class="ks" id="ks"></div>
    </div>
  </div>

  <!-- TOPIC -->
  <div class="topic-section" style="margin-top:20px">
    <div class="section-label">議論テーマ</div>
    <textarea id="topic" placeholder="例：「AIは人間の仕事を奪うか？」&#10;例：「週4日勤務は生産性を上げるか？」&#10;例：「SNSは民主主義に有害か？」"></textarea>
  </div>

  <!-- ROLES -->
  <div class="roles-section">
    <div class="section-label" style="margin-bottom:10px">各AIの役割（変更可）</div>
    <div class="roles-grid" id="rolesGrid"></div>
  </div>

  <!-- START -->
  <div class="start-area">
    <button class="start-btn" id="startBtn" onclick="startDebate()">⚡ 議論スタート</button>
    <button class="reset-btn" onclick="resetAll()">↺ リセット</button>
    <span class="shortcut">Ctrl+Enter でも開始</span>
  </div>
</div>

<!-- PROGRESS -->
<div class="progress-bar">
  <div class="progress-track"><div class="progress-fill" id="pf"></div></div>
  <div class="progress-label" id="pl"></div>
</div>

<!-- EMPTY STATE -->
<div id="emptyState" class="empty-state">
  <div class="ei"><span>⚡</span><span>🔥</span><span>⚔️</span><span>⚖️</span></div>
  <div class="et">テーマを入力して議論をスタートさせてください</div>
</div>

<!-- ARENA -->
<div class="arena" id="arena" style="display:none">
  <div class="arena-title">フェーズ 1 ── 議論</div>
  <div class="debate-grid" id="debateGrid"></div>

  <div class="arena-title" id="judgeTitle" style="display:none">フェーズ 2 ── 審判の結論</div>
  <div class="judge-panel" id="judgePanel" style="display:none">
    <div class="judge-glow"></div>
    <div class="judge-header">
      <span class="judge-crown">⚖️</span>
      <div>
        <div class="judge-title">審判 AI</div>
      </div>
      <span class="judge-subtitle" id="judgeModel">待機中</span>
      <span class="judge-spinner" id="judgeSpin" style="display:none"></span>
    </div>
    <div class="judge-body" id="judgeBody">
      <div class="judge-waiting">
        <div class="waiting-dots"><span></span><span></span><span></span></div>
        <div class="judge-waiting-text">全AIの議論完了を待っています...</div>
      </div>
    </div>
  </div>
</div>

<div style="height:60px"></div>

<script>
// ────────────────────────────────────
// 設定
// ────────────────────────────────────
const OR_URL = 'https://openrouter.ai/api/v1/chat/completions';
const KEY_STORE = 'tenbin_key';

const DEFAULT_ROLES = [
  { id:'a', icon:'⚡', color:'#ff7c5c', label:'賛成派', stance:'このテーマに強く賛成する論者として、具体的な根拠と事例を挙げて主張してください。反論も想定した上で説得力ある意見を述べてください。' },
  { id:'b', icon:'🌊', color:'#4ea8ff', label:'反対派', stance:'このテーマに強く反対する論者として、具体的な根拠と事例を挙げて主張してください。反論も想定した上で説得力ある意見を述べてください。' },
  { id:'c', icon:'🌿', color:'#3de87a', label:'中立・分析', stance:'このテーマについて中立の立場から、賛成・反対両方の論点を客観的に分析してください。データや研究結果を交えた冷静な分析をしてください。' },
];

let busy = false;

// ────────────────────────────────────
// APIキー管理
// ────────────────────────────────────
const lk = () => localStorage.getItem(KEY_STORE) || '';
function saveKey() {
  const v = document.getElementById('ki').value.trim();
  if (!v) { ss('キーを入力してください','warn'); return; }
  if (!v.startsWith('sk-or-')) { ss('"sk-or-" から始まるキーを入力してください','warn'); return; }
  localStorage.setItem(KEY_STORE, v);
  ss('✓ 保存しました！','ok');
}
function ss(m,c){ const e=document.getElementById('ks'); e.textContent=m; e.className='ks '+(c||''); }

// ────────────────────────────────────
// 役割UI生成
// ────────────────────────────────────
function buildRoles() {
  const grid = document.getElementById('rolesGrid');
  grid.innerHTML = '';
  DEFAULT_ROLES.forEach(r => {
    const el = document.createElement('div');
    el.className = 'role-card';
    el.style.setProperty('--rc', r.color);
    el.innerHTML = `
      <div class="role-header">
        <span class="role-icon" style="color:${r.color}">${r.icon}</span>
        <span class="role-name" style="color:${r.color}">${r.label}</span>
      </div>
      <input class="role-input" id="role_${r.id}" value="${r.label}"
        placeholder="${r.label}" style="--rc:${r.color}">`;
    grid.appendChild(el);
  });
  // 審判スロット
  const judgeEl = document.createElement('div');
  judgeEl.className = 'role-card';
  judgeEl.style.setProperty('--rc', '#f5c842');
  judgeEl.innerHTML = `
    <div class="role-header">
      <span class="role-icon" style="color:#f5c842">⚖️</span>
      <span class="role-name" style="color:#f5c842">審判</span>
    </div>
    <div style="font-family:'Syne',sans-serif;font-size:10px;color:var(--mt);line-height:1.6;">
      3者の意見を読んで<br>最終結論を自動生成
    </div>`;
  grid.appendChild(judgeEl);
}

// ────────────────────────────────────
// 進捗管理
// ────────────────────────────────────
function setProgress(pct, label) {
  document.getElementById('pf').style.width = pct + '%';
  document.getElementById('pl').textContent = label;
}
function setPhase(n) {
  ['pd1','pd2','pd3'].forEach((id,i) => {
    const el = document.getElementById(id);
    el.classList.remove('active','done');
    if (i+1 < n) el.classList.add('done');
    if (i+1 === n) el.classList.add('active');
  });
}

// ────────────────────────────────────
// API呼び出し
// ────────────────────────────────────
async function callAI(systemPrompt, userPrompt, key) {
  const res = await fetch(OR_URL, {
    method: 'POST',
    headers: {
      'Authorization': 'Bearer ' + key,
      'Content-Type': 'application/json',
      'HTTP-Referer': location.href,
      'X-Title': 'TENBIN AI Debate',
    },
    body: JSON.stringify({
      model: 'openrouter/free',
      messages: [
        { role: 'system', content: systemPrompt },
        { role: 'user', content: userPrompt },
      ],
    }),
  });
  if (!res.ok) {
    const err = await res.json().catch(() => ({}));
    throw new Error(res.status + ': ' + (err?.error?.message || res.statusText));
  }
  const data = await res.json();
  return {
    text: data?.choices?.[0]?.message?.content || '（空の回答）',
    model: data?.model || 'openrouter/free',
  };
}

// ────────────────────────────────────
// 議論カード生成
// ────────────────────────────────────
function buildDebateCard(r) {
  const card = document.createElement('div');
  card.className = 'dcard fi';
  card.id = 'dc_' + r.id;
  card.style.setProperty('--rc', r.color);
  const label = document.getElementById('role_'+r.id)?.value || r.label;
  card.innerHTML = `
    <div class="dcard-header">
      <span class="dcard-icon">${r.icon}</span>
      <span class="dcard-name">${label}</span>
      <span class="dcard-model" id="dm_${r.id}">回答待ち...</span>
      <span class="dcard-spinner" id="ds_${r.id}"></span>
    </div>
    <div class="dcard-body" id="db_${r.id}">
      <div class="sk">
        ${[100,78,88,65,72].map(w=>`<div class="sl" style="width:${w}%"></div>`).join('')}
      </div>
    </div>`;
  return card;
}

function typewrite(el, text, speed=5) {
  const p = document.createElement('p');
  el.innerHTML = ''; el.appendChild(p);
  let i = 0;
  const t = setInterval(() => { p.textContent = text.slice(0,++i); if(i>=text.length) clearInterval(t); }, speed);
}

// ────────────────────────────────────
// メイン議論フロー
// ────────────────────────────────────
async function startDebate() {
  if (busy) return;
  const key = lk();
  if (!key) { ss('⚠ APIキーを先に保存してください','warn'); return; }
  const topic = document.getElementById('topic').value.trim();
  if (!topic) { document.getElementById('topic').focus(); return; }

  busy = true;
  document.getElementById('startBtn').disabled = true;
  document.getElementById('startBtn').textContent = '議論中...';
  document.getElementById('emptyState').style.display = 'none';

  const arena = document.getElementById('arena');
  arena.style.display = 'block';
  const debateGrid = document.getElementById('debateGrid');
  debateGrid.innerHTML = '';

  // カード生成
  DEFAULT_ROLES.forEach(r => debateGrid.appendChild(buildDebateCard(r)));

  // フェーズ1開始
  setPhase(1);
  setProgress(10, '各AIが議論を開始しています...');

  // ── フェーズ1: 1つずつ順番に議論（429対策）──
  const debateResults = [];

  for (let i = 0; i < DEFAULT_ROLES.length; i++) {
    const r = DEFAULT_ROLES[i];
    const card = document.getElementById('dc_'+r.id);
    const body = document.getElementById('db_'+r.id);
    card.classList.add('loading');
    setProgress(10 + Math.round(i/DEFAULT_ROLES.length * 55), `${r.icon} ${r.label} が意見を述べています... (${i+1}/${DEFAULT_ROLES.length})`);
    try {
      const system = r.stance;
      const user = `議論テーマ：「${topic}」\n\n上記テーマについて、あなたの立場から300〜500文字程度で意見を述べてください。`;
      const result = await callAI(system, user, key);
      card.classList.remove('loading'); card.classList.add('done');
      document.getElementById('ds_'+r.id)?.remove();
      const label = document.getElementById('role_'+r.id)?.value || r.label;
      document.getElementById('dm_'+r.id).textContent = result.model.split('/').pop();
      typewrite(body, result.text);
      debateResults.push({ role: label, icon: r.icon, text: result.text });
    } catch(e) {
      card.classList.remove('loading');
      document.getElementById('ds_'+r.id)?.remove();
      document.getElementById('dm_'+r.id).textContent = 'エラー';
      body.innerHTML = `<div class="er">⚠ ${e.message}</div>`;
      debateResults.push({ role: r.label, icon: r.icon, text: `（エラーのため意見なし）` });
    }
    // 次のリクエストまで少し待機（レート制限対策）
    if (i < DEFAULT_ROLES.length - 1) await new Promise(res => setTimeout(res, 1500));
  }

  // ── フェーズ2: 審判AI ──
  setPhase(2);
  setProgress(70, '審判AIが全意見を分析中...');

  const judgeTitle = document.getElementById('judgeTitle');
  const judgePanel = document.getElementById('judgePanel');
  judgeTitle.style.display = 'flex';
  judgePanel.style.display = 'block';
  judgePanel.classList.add('active','ji');
  document.getElementById('judgeSpin').style.display = 'inline-block';

  // 全意見をまとめたプロンプト構築
  const opinionsText = debateResults.map(r =>
    `【${r.icon} ${r.role}の意見】\n${r.text}`
  ).join('\n\n---\n\n');

  const judgeSystem = `あなたは公正な議論の審判者です。複数の論者の意見を読み、以下の形式で最終結論を出してください：

【各意見の要点整理】
各論者の主要な主張を1〜2文でまとめる

【議論の核心】
この議論の最も重要な対立点や論点を指摘する

【総合評価】
どの意見が最も説得力があり、なぜそうなのかを論じる

【最終結論】
テーマに対する最終的な答えを、根拠とともに明確に述べる

公平で論理的な視点から判断してください。`;

  const judgeUser = `議論テーマ：「${topic}」\n\n以下の3者の意見を踏まえて、最終結論を出してください：\n\n${opinionsText}`;

  try {
    const judgeResult = await callAI(judgeSystem, judgeUser, key);
    document.getElementById('judgeSpin').style.display = 'none';
    document.getElementById('judgeModel').textContent = judgeResult.model.split('/').pop();
    const jb = document.getElementById('judgeBody');
    typewrite(jb, judgeResult.text, 6);
    setPhase(3);
    setProgress(100, '✓ 議論完了 — 審判AIによる結論が出ました');
  } catch(e) {
    document.getElementById('judgeSpin').style.display = 'none';
    document.getElementById('judgeBody').innerHTML = `<div class="er">⚠ 審判AIエラー: ${e.message}</div>`;
    setProgress(100, '議論完了（審判エラーあり）');
  }

  busy = false;
  document.getElementById('startBtn').disabled = false;
  document.getElementById('startBtn').textContent = '⚡ 再議論';

  // 審判パネルまでスクロール
  setTimeout(() => {
    judgePanel.scrollIntoView({ behavior:'smooth', block:'start' });
  }, 500);
}

// ────────────────────────────────────
// リセット
// ────────────────────────────────────
function resetAll() {
  if (busy) return;
  document.getElementById('topic').value = '';
  document.getElementById('arena').style.display = 'none';
  document.getElementById('emptyState').style.display = 'flex';
  document.getElementById('judgeTitle').style.display = 'none';
  document.getElementById('judgePanel').style.display = 'none';
  document.getElementById('judgePanel').classList.remove('active','ji');
  document.getElementById('judgeBody').innerHTML = `
    <div class="judge-waiting">
      <div class="waiting-dots"><span></span><span></span><span></span></div>
      <div class="judge-waiting-text">全AIの議論完了を待っています...</div>
    </div>`;
  document.getElementById('judgeModel').textContent = '待機中';
  document.getElementById('startBtn').textContent = '⚡ 議論スタート';
  setProgress(0,'');
  setPhase(0);
}

// ────────────────────────────────────
// 初期化
// ────────────────────────────────────
(function init() {
  const saved = lk();
  if (saved) { document.getElementById('ki').value = saved; ss('✓ 設定済み','ok'); }
  buildRoles();
})();

document.addEventListener('keydown', e => {
  if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') startDebate();
});
</script>
